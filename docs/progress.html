<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진행보드 — TEAMPPT</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">TEAM<span>PPT</span></a>
  <ul class="nav-links">
    <li><a href="features.html">기능</a></li>
    <li><a href="data.html">데이터</a></li>
    <li><a href="progress.html" class="active">진행보드</a></li>
    <li><a href="pitch.html">피치</a></li>
    <li><a href="download.html">다운로드</a></li>
  </ul>
</nav>

<div class="page-hero">
  <div class="page-hero-tag">진행보드 · Now</div>
  <h1>지금 <em>여기</em></h1>
  <p>PROGRESS-BOARD.md 기준 · 세션 종료 시 자동 갱신</p>
</div>

<div class="abar">
  <span class="atag atag-dev">진행보드</span>
  <span class="abar-text" id="pb-updated">로딩 중...</span>
</div>

<div class="section-wrap" id="pb-root">
  <div style="color:var(--text3);font-size:14px;text-align:center;padding:48px 0">데이터 불러오는 중...</div>
</div>

<footer>
  <strong>TEAMPPT</strong> — Vibe Designing
  <span><a href="index.html" style="color:rgba(255,255,255,.4);text-decoration:none">← 홈으로</a></span>
</footer>

<script>
fetch('site-data.json').then(r=>r.json()).then(d=>{
  const p = d.progress;
  if(!p) return;

  document.getElementById('pb-updated').textContent =
    '지금 여기 · PROGRESS-BOARD.md 기준 · 최종 갱신 ' + p.lastUpdated;

  // ── 로드맵 상태 3칸 ──────────────────────────────────────
  const rmStyles = {
    done:    { wrap:'background:var(--green-light);border:1.5px solid #a7f3d0', label:'color:#0a7a50', title:'color:#065f46', sub:'color:#0a7a50', suffix:'✅' },
    active:  { wrap:'background:var(--accent-light);border:1.5px solid #bfdbfe', label:'color:#1a56db', title:'color:#1d4ed8', sub:'color:#3b82f6', suffix:'🔵' },
    pending: { wrap:'background:var(--bg);border:1.5px solid var(--border);opacity:.7', label:'color:var(--text3)', title:'color:var(--text2)', sub:'color:var(--text3)', suffix:'⬜' }
  };
  const rmHTML = p.roadmap.map(r=>{
    const s = rmStyles[r.status]||rmStyles.pending;
    return `<div style="${s.wrap};border-radius:var(--r);padding:18px 20px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;${s.label};margin-bottom:6px">${r.id} · ${r.status==='done'?'완료':r.status==='active'?'진행 중':'대기'} ${s.suffix}</div>
      <div style="font-size:14px;font-weight:700;${s.title}">${r.label}</div>
      <div style="font-size:12px;${s.sub};margin-top:3px">${r.sub}</div>
    </div>`;
  }).join('');

  // ── 현재 상태 히어로 ─────────────────────────────────────
  const heroHTML = `
    <div style="background:var(--hero);border-radius:var(--r);padding:28px 32px;margin-bottom:14px;position:relative;overflow:hidden">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(49,130,246,.15),transparent 70%);pointer-events:none"></div>
      <div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#7eb8ff;margin-bottom:12px">현재 상태</div>
      <div style="font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:8px">${p.currentSummary}</div>
      <div style="font-size:14px;color:rgba(255,255,255,.6);line-height:1.75;margin-bottom:16px">${p.currentDetail}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span style="background:rgba(49,130,246,.25);border:1px solid rgba(49,130,246,.4);color:#7eb8ff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:6px">${p.branch}</span>
      </div>
    </div>`;

  // ── Task 큐 ───────────────────────────────────────────────
  const queueHTML = p.queue.map(q=>{
    const isNext = q.status==='next';
    return `<div style="background:var(--white);border-radius:var(--r-sm);padding:18px 22px;border:${isNext?'1.5px solid var(--accent)':'1px solid var(--border)'};display:grid;grid-template-columns:80px 1fr auto;align-items:center;gap:16px;box-shadow:var(--shadow);${isNext?'':'opacity:.8'}">
      <div style="font-size:13px;font-weight:800;color:${isNext?'var(--accent)':'var(--text3)'}">${q.id}</div>
      <div>
        <div style="font-size:14px;font-weight:700;margin-bottom:3px">${q.label}</div>
        <div style="font-size:12px;color:var(--text2)">${q.detail}</div>
      </div>
      <span style="font-size:11px;font-weight:700;${isNext?'background:var(--accent);color:#fff':'background:var(--bg);color:var(--text3);border:1px solid var(--border)'};padding:4px 12px;border-radius:99px;white-space:nowrap">${isNext?'다음':'대기'}</span>
    </div>`;
  }).join('');

  // ── 데모 옵션 (있을 때만) ────────────────────────────────
  let demoHTML = '';
  if(p.demoOptions && p.demoOptions.length){
    const items = p.demoOptions.map(o=>`
      <div style="background:var(--white);border-radius:var(--r-sm);padding:14px 22px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)">
        <div>
          <span style="font-size:13px;font-weight:700">${o.label}</span>
          <span style="font-size:12px;color:var(--text2);margin-left:10px">${o.detail}</span>
        </div>
        <span style="font-size:11px;font-weight:700;color:var(--orange);white-space:nowrap">옵션</span>
      </div>`).join('');
    demoHTML = `
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:28px 0 12px">데모 임박 시 우선 처리 옵션</div>
      <div style="display:flex;flex-direction:column;gap:8px">${items}</div>`;
  }

  // ── 완료 ─────────────────────────────────────────────────
  const doneHTML = p.done.map(item=>`
    <div style="background:var(--green-light);border-radius:var(--r-sm);padding:14px 22px;border:1px solid #a7f3d0;display:flex;justify-content:space-between;align-items:center">
      <div>
        <span style="font-size:13px;font-weight:700;color:#065f46">${item.label}</span>
        <span style="font-size:12px;color:#0a7a50;margin-left:10px">${item.detail}</span>
      </div>
      <span style="font-size:11px;font-weight:700;color:#065f46;white-space:nowrap">✓ 완료</span>
    </div>`).join('');

  // ── 보류 ─────────────────────────────────────────────────
  const holdHTML = p.onHold.map(h=>`<div style="font-size:13px;color:var(--text2)">· ${h}</div>`).join('');

  // ── 조립 ─────────────────────────────────────────────────
  document.getElementById('pb-root').innerHTML = `
    <div class="section-label">Now</div>
    <h2 class="stitle">지금 여기</h2>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">${rmHTML}</div>

    ${heroHTML}

    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:28px 0 12px">리디자인 Phase 로드맵</div>
    <div style="display:flex;flex-direction:column;gap:10px">${queueHTML}</div>

    ${demoHTML}

    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:28px 0 12px">완료</div>
    <div style="display:flex;flex-direction:column;gap:8px">${doneHTML}</div>

    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:28px 0 12px">보류</div>
    <div style="background:var(--white);border-radius:var(--r-sm);padding:20px 22px;border:1px solid var(--border);display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow)">${holdHTML}</div>

    <div style="margin-top:20px;padding:14px 18px;background:var(--bg);border-radius:var(--r-sm);font-size:12px;color:var(--text2);border-left:3px solid var(--border)">
      이 보드는 <strong style="color:var(--text)">docs/site-data.json</strong> 기준. Claude Code 세션 종료 시 자동 갱신됨.
    </div>`;

}).catch(()=>{
  document.getElementById('pb-root').innerHTML =
    '<div style="color:var(--text3);font-size:14px;text-align:center;padding:48px 0">데이터를 불러올 수 없습니다.</div>';
});
</script>

</body>
</html>
